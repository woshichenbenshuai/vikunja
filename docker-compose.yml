services:
  init-permissions:
    image: alpine:3.20
    container_name: vikunja-init-permissions
    command: ["sh", "-c", "mkdir -p /data/files /data/tg-reminder-bot && chown -R 1000:1000 /data/files /data/tg-reminder-bot"]
    volumes:
      - ./docker-data/files:/data/files
      - ./docker-data/tg-reminder-bot:/data/tg-reminder-bot

  db:
    image: postgres:16-alpine
    container_name: vikunja-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vikunja}
      POSTGRES_USER: ${POSTGRES_USER:-vikunja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vikunja} -d $${POSTGRES_DB:-vikunja}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vikunja:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/vikunja:dev
    container_name: vikunja
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL:-http://127.0.0.1:17003/}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:-change-this-to-a-long-random-secret}
      VIKUNJA_SERVICE_TIMEZONE: ${TZ:-Asia/Shanghai}
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_DATABASE: ${POSTGRES_DB:-vikunja}
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER:-vikunja}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      VIKUNJA_DATABASE_SSLMODE: disable
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${VIKUNJA_HOST_PORT:-17003}:3456"
    volumes:
      - ./docker-data/files:/app/vikunja/files
    restart: unless-stopped

  tg-reminder-bot:
    build:
      context: ./tg-reminder-bot
      dockerfile: Dockerfile
    image: local/vikunja-tg-reminder-bot:dev
    container_name: vikunja-tg-reminder-bot
    profiles:
      - tg
    depends_on:
      vikunja:
        condition: service_started
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS}
      VIKUNJA_API_URL: http://vikunja:3456
      VIKUNJA_PUBLIC_URL: ${VIKUNJA_PUBLIC_URL:-http://127.0.0.1:17003/}
      VIKUNJA_API_TOKEN: ${VIKUNJA_API_TOKEN}
      TG_REMINDER_LOOKAHEAD_DAYS: ${TG_REMINDER_LOOKAHEAD_DAYS:-3}
      TG_REMINDER_POLL_SECONDS: ${TG_REMINDER_POLL_SECONDS:-300}
      TG_REMINDER_STATE_PATH: /data/state.json
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./docker-data/tg-reminder-bot:/data
    restart: unless-stopped
