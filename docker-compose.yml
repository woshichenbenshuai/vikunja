services:
  db:
    image: postgres:16-alpine
    container_name: vikunja-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vikunja}
      POSTGRES_USER: ${POSTGRES_USER:-vikunja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vikunja} -d $${POSTGRES_DB:-vikunja}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vikunja:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/vikunja:dev
    container_name: vikunja
    depends_on:
      db:
        condition: service_healthy
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL:-http://127.0.0.1:17003/}
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_JWT_SECRET:-change-this-to-a-long-random-secret}
      VIKUNJA_SERVICE_TIMEZONE: ${TZ:-Asia/Shanghai}
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_DATABASE: ${POSTGRES_DB:-vikunja}
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER:-vikunja}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      VIKUNJA_DATABASE_SSLMODE: disable
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${VIKUNJA_HOST_PORT:-17003}:3456"
    volumes:
      - ./docker-data/files:/app/vikunja/files
    restart: unless-stopped
